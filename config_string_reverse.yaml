model:
  vocab_size: 30
  embed_dim: 256
  num_heads: 8
  num_layers: 6
  dim_feedforward: 1024
  max_seq_len: 128

dataset:
  task_type: "string_reverse"
  size: 50000
  min_len: 3
  max_len: 30
  batch_size: 128

training:
  epochs: 40
  lr: 0.0003
  weight_decay: 0.0001
  log_interval: 10
  device: "cuda"

paths:
  output_dir: "./experiments"
