model:
  vocab_size: 30
  embed_dim: 128
  num_heads: 4
  num_layers: 2
  dim_feedforward: 256
  max_seq_len: 128

dataset:
  task_type: "integer_addition"
  size: 500
  min_digits: 1
  max_digits: 3
  batch_size: 32

training:
  epochs: 2
  lr: 0.001
  weight_decay: 0.0001
  log_interval: 5
  device: "cpu"

paths:
  output_dir: "./experiments"
