model:
  vocab_size: 20
  embed_dim: 256
  num_heads: 8
  num_layers: 6
  dim_feedforward: 1024
  max_seq_len: 128

dataset:
  task_type: "integer_addition"
  size: 200000
  min_digits: 1
  max_digits: 5
  batch_size: 256

training:
  epochs: 30
  lr: 0.0003
  weight_decay: 0.0001
  log_interval: 10
  device: "cuda"

paths:
  output_dir: "./experiments_addition"
