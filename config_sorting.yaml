model:
  vocab_size: 16
  embed_dim: 256
  num_heads: 8
  num_layers: 6
  dim_feedforward: 1024
  max_seq_len: 256

dataset:
  task_type: "number_sorting"
  size: 200000
  min_len: 3
  max_len: 12
  batch_size: 128

training:
  epochs: 50
  lr: 0.0003
  weight_decay: 0.01
  log_interval: 50
  device: "cuda"

paths:
  output_dir: "./experiments_sorting"
